<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
    <defs>
        <linearGradient id="korusGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#d97706" />
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#f59e0b" flood-opacity="0.25" />
            <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12" />
        </filter>
    </defs>

    <!-- Rounded brand tile (style inspiré de .sidebar__logo) -->
    <g filter="url(#shadow)">
        <rect x="52" y="52" width="408" height="408" rx="116" fill="url(#korusGradient)" />
        <!-- Inset highlight -->
        <rect x="60" y="60" width="392" height="392" rx="108" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="10" />
    </g>

    <!-- Lettermark -->
    <text x="256" y="322" text-anchor="middle" fill="#ffffff" font-family="Plus Jakarta Sans, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="260" font-weight="800" letter-spacing="-8">K</text>
</svg>
